# TEGS-Learning - Docker Compose (dev/staging)
# Usage: docker compose up --build

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/tegs_learning
      - JWT_SECRET=${JWT_SECRET:-tegs_learning_dev_secret_change_in_production}
      - JWT_EXPIRES_IN=24h
      - GCS_ENABLED=${GCS_ENABLED:-true}
      - GCS_SERVICE_URL=${GCS_SERVICE_URL:-https://dp-storage-service-746425674533.us-central1.run.app}
      - GCS_JWT_SECRET=${GCS_JWT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:3000/api}
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - NUXT_PUBLIC_API_BASE=${NUXT_PUBLIC_API_BASE:-http://localhost:3000/api}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo-data:
