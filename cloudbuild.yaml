# TEGS-Learning - Cloud Build CI/CD
# Deploys: Backend -> Cloud Run, Frontend -> Firebase Hosting
# Project: luminous-mesh-459718-p4

substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE: tegs-backend

steps:
  # --- Backend: Build & Push ---
  - id: "build-backend"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest"
      - "./backend"

  - id: "push-backend"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}"]
    waitFor: ["build-backend"]

  # --- Backend: Deploy to Cloud Run ---
  - id: "deploy-backend"
    name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "${_BACKEND_SERVICE}"
      - "--image=gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=3000"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=1"
      - "--max-instances=10"
      - "--set-env-vars=GCS_ENABLED=true,GCS_SERVICE_URL=https://dp-storage-service-746425674533.us-central1.run.app,JWT_EXPIRES_IN=24h"
      - "--set-secrets=MONGODB_URI=tegs-mongo-uri:latest,JWT_SECRET=tegs-jwt-secret:latest,GCS_JWT_SECRET=tegs-gcs-jwt-secret:latest"
    waitFor: ["push-backend"]

  # --- Frontend: Get backend URL, build Nuxt, deploy to Firebase ---
  - id: "build-and-deploy-frontend"
    name: "node:20-alpine"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        # Install Firebase CLI
        npm install -g firebase-tools

        # Get backend URL
        apk add --no-cache curl
        BACKEND_URL=$$(gcloud run services describe ${_BACKEND_SERVICE} --region=${_REGION} --format='value(status.url)' 2>/dev/null || echo "https://tegs-backend-746425674533.us-central1.run.app")

        # Build Nuxt
        cd frontend
        npm ci
        NUXT_PUBLIC_API_BASE="$${BACKEND_URL}/api" npm run build

        # Deploy to Firebase Hosting
        firebase deploy --only hosting --project=$PROJECT_ID --token="$$FIREBASE_TOKEN"
    secretEnv: ["FIREBASE_TOKEN"]
    waitFor: ["deploy-backend"]

availableSecrets:
  secretManager:
    - versionName: "projects/$PROJECT_ID/secrets/firebase-ci-token/versions/latest"
      env: "FIREBASE_TOKEN"

images:
  - "gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
